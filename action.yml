name: "VibeDrift — Drift Detection"
description: "Run VibeDrift on every PR. Posts a comment with score delta + new drifts. Fails the check if the score drops below your threshold."
author: "VibeDrift (vibedrift.ai)"

branding:
  icon: "shield"
  color: "yellow"

inputs:
  token:
    description: "VibeDrift API token (from vibedrift.ai/dashboard → Settings)"
    required: true
  path:
    description: "Path to the project directory to scan"
    required: false
    default: "."
  fail-on-score:
    description: "Fail the check if the composite score drops below this threshold (0-100)"
    required: false
    default: ""
  deep:
    description: "Run AI-powered deep scan (uses deep scan budget)"
    required: false
    default: "false"

outputs:
  score:
    description: "Composite drift score (0-100)"
    value: ${{ steps.scan.outputs.score }}
  grade:
    description: "Letter grade (A-F)"
    value: ${{ steps.scan.outputs.grade }}
  finding-count:
    description: "Total number of findings"
    value: ${{ steps.scan.outputs.finding_count }}

runs:
  using: "composite"
  steps:
    - name: Install and run VibeDrift
      id: scan
      shell: bash
      env:
        VIBEDRIFT_TOKEN: ${{ inputs.token }}
        SCAN_PATH: ${{ inputs.path }}
        DEEP_FLAG: ${{ inputs.deep == 'true' && '--deep' || '' }}
        FAIL_SCORE: ${{ inputs.fail-on-score }}
      run: |
        echo "::group::VibeDrift Scan"

        # Install CLI globally — more reliable than npx in CI
        npm install -g @vibedrift/cli@latest 2>&1 | tail -3

        # Run the scan — JSON to stdout, stderr captured for scan ID extraction
        STDERR_FILE=$(mktemp)
        RESULT=$(node $(npm root -g)/@vibedrift/cli/dist/cli/index.js "$SCAN_PATH" --json --no-cache --verbose $DEEP_FLAG 2>"$STDERR_FILE") || true

        # Extract scan ID from stderr (e.g. "[scan-log] Logged scan 8dce95e2")
        SCAN_ID=$(grep -oP 'Logged scan \K[a-f0-9-]+' "$STDERR_FILE" 2>/dev/null | head -1)
        cat "$STDERR_FILE" >&2
        rm -f "$STDERR_FILE"

        if [ -z "$RESULT" ]; then
          echo "::error::VibeDrift CLI produced no JSON output. Ensure the path is correct."
          exit 1
        fi

        # Extract metrics
        SCORE=$(echo "$RESULT" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('compositeScore',0))" 2>/dev/null || echo "0")
        MAX=$(echo "$RESULT" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('maxCompositeScore',100))" 2>/dev/null || echo "100")
        FINDINGS=$(echo "$RESULT" | python3 -c "import json,sys; d=json.load(sys.stdin); print(len(d.get('findings',[])))" 2>/dev/null || echo "0")

        # Grade
        PCT=$(python3 -c "print(round(float('$SCORE') / max(float('$MAX'), 1) * 100, 1))")
        GRADE=$(python3 -c "
        p=$PCT
        print('A' if p>=90 else 'B' if p>=75 else 'C' if p>=50 else 'D' if p>=25 else 'F')
        ")

        echo "Score: $SCORE/$MAX ($GRADE) · $FINDINGS findings"

        # Outputs
        echo "score=$SCORE" >> $GITHUB_OUTPUT
        echo "grade=$GRADE" >> $GITHUB_OUTPUT
        echo "finding_count=$FINDINGS" >> $GITHUB_OUTPUT
        echo "scan_id=$SCAN_ID" >> $GITHUB_OUTPUT

        # Build report URL
        REPORT_URL=""
        if [ -n "$SCAN_ID" ]; then
          REPORT_URL="https://vibedrift.ai/dashboard/scans/$SCAN_ID"
          echo "Full report: $REPORT_URL"
        fi

        echo "::endgroup::"

        # Job summary
        echo "## VibeDrift Scan" >> $GITHUB_STEP_SUMMARY
        echo "**Score:** $SCORE/$MAX (**$GRADE**)" >> $GITHUB_STEP_SUMMARY
        echo "**Findings:** $FINDINGS" >> $GITHUB_STEP_SUMMARY
        if [ -n "$REPORT_URL" ]; then
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[$REPORT_URL]($REPORT_URL)" >> $GITHUB_STEP_SUMMARY
        fi
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "_Run locally: \`npx @vibedrift/cli .\` · [vibedrift.ai](https://vibedrift.ai)_" >> $GITHUB_STEP_SUMMARY

        # Fail threshold
        if [ -n "$FAIL_SCORE" ]; then
          BELOW=$(python3 -c "print('yes' if float('$SCORE') < float('$FAIL_SCORE') else 'no')")
          if [ "$BELOW" = "yes" ]; then
            echo "::error::VibeDrift: score $SCORE is below threshold $FAIL_SCORE"
            exit 1
          fi
        fi

    - name: Post PR comment
      if: github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        SCORE: ${{ steps.scan.outputs.score }}
        GRADE: ${{ steps.scan.outputs.grade }}
        FINDINGS: ${{ steps.scan.outputs.finding_count }}
        SCAN_ID: ${{ steps.scan.outputs.scan_id }}
      run: |
        PR_NUMBER=${{ github.event.pull_request.number }}
        REPO=${{ github.repository }}

        REPORT_LINK=""
        if [ -n "$SCAN_ID" ]; then
          REPORT_LINK="[View full report →](https://vibedrift.ai/dashboard/scans/$SCAN_ID)"
        fi

        read -r -d '' BODY << 'COMMENT' || true
        <!-- vibedrift-pr-comment -->
        ## VibeDrift — Drift Report

        | Metric | Value |
        |---|---|
        | **Score** | SCORE_PH/100 (**GRADE_PH**) |
        | **Findings** | FINDINGS_PH |

        REPORT_LINK_PH

        ---
        _[vibedrift.ai](https://vibedrift.ai) · Run locally: `npx @vibedrift/cli .`_
        COMMENT

        BODY="${BODY//SCORE_PH/$SCORE}"
        BODY="${BODY//GRADE_PH/$GRADE}"
        BODY="${BODY//FINDINGS_PH/$FINDINGS}"
        BODY="${BODY//REPORT_LINK_PH/$REPORT_LINK}"

        # Find existing comment
        EXISTING=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" --jq '.[] | select(.body | contains("vibedrift-pr-comment")) | .id' 2>/dev/null | head -1)

        if [ -n "$EXISTING" ]; then
          gh api "repos/$REPO/issues/comments/$EXISTING" -X PATCH -f body="$BODY" > /dev/null 2>&1
          echo "Updated existing PR comment"
        else
          gh api "repos/$REPO/issues/$PR_NUMBER/comments" -f body="$BODY" > /dev/null 2>&1
          echo "Posted new PR comment"
        fi
